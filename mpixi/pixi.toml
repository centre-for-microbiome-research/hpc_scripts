[tasks.postinstall-activate-vars]
# Write pixi activation env vars (PYTHONNOUSERSITE, CHECKM2DB, etc.) into each
# environment's activate.d so they apply even when activated via `conda activate`
cmd = "python write_activate_vars.py"

[tasks.postinstall-aviary-config]
# Write aviary's embedded .pixi/config.toml (detached-environments = false)
cmd = ["python", "write_pixi_configs.py", "aviary-v0-13-0", "aviary"]

[tasks.postinstall-binchicken-config]
# Write binchicken's embedded .pixi/config.toml (detached-environments = false)
cmd = ["python", "write_pixi_configs.py", "binchicken-v0-13-5", "binchicken"]

[tasks.postinstall-binchicken-aviary-config]
# Write aviary's .pixi/config.toml nested inside the binchicken env (detached-environments = false)
cmd = ["python", "write_pixi_configs.py", "binchicken-v0-13-5", "aviary", "binchicken"]
depends-on = [{ task = "binchicken-build-no-aviary", environment = "binchicken-v0-13-5" }]

[tasks.postinstall]
# Build steps that aviary/binchicken need after their conda deps are installed
depends-on = [
    "postinstall-activate-vars",
    { task = "postinstall-base", environment = "aviary-v0-13-0" },
    { task = "postinstall-base", environment = "binchicken-v0-13-5" },
]
