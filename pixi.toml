[workspace]
authors = ["Ben Woodcroft <benjwoodcroft@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "hpc_scripts"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test = "pytest tests"

[dependencies]

[feature.dev.dependencies]
python = "*"
pytest = "*"

[feature.dev.tasks]
# Refresh mqyolo-non-sensitive-folders.json from the CMR work-folders sheet.
update-non-sensitive-folders = "python bin/generate_mqyolo_non_sensitive_folders.py"

[feature.snakemake.dependencies]
snakemake = "*"
snakemake-executor-plugin-cluster-generic = "*"

[environments]
dev = ["dev"]
snakemake = ["snakemake"]
